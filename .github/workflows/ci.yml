name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build de producción
        run: npm run build
        env:
          # La BD no es accesible en CI: el catálogo captura el error y el build no la necesita.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          NEXTAUTH_SECRET: "ci-secret-no-usar-en-produccion"
          NEXTAUTH_URL: "http://localhost:3000"
